name: Build GoldenEye Launcher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build exe
        run: >
          pyinstaller
          --onefile
          --windowed
          --name "GoldenEye Launcher"
          --icon "icon.png"
          --add-data "banner.png;."
          --add-data "icon.png;."
          launcher.py

      - name: Upload exe to release
        if: startsWith(github.ref, 'refs/tags/')
        run: gh release upload "${{ github.ref_name }}" "dist/GoldenEye Launcher.exe" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (non-release builds)
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: GoldenEye-Launcher
          path: "dist/GoldenEye Launcher.exe"
          retention-days: 30
