name: Build GoldenEye Launcher

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build exe
        run: >
          pyinstaller
          --onefile
          --windowed
          --name "GoldenEye Launcher"
          --add-data "banner.png;."
          launcher.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GoldenEye-Launcher
          path: "dist/GoldenEye Launcher.exe"
          retention-days: 30
